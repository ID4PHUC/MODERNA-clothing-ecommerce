<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Giỏ Hàng - MODERNA</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/navbar.css">
  <link rel="stylesheet" href="css/footer.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700;800&display=swap" rel="stylesheet">
  <!-- File CSS riêng cho giỏ hàng -->
  <link rel="stylesheet" href="css/cart.css">
</head>
<body>
  <!-- thong bao -->
  <div id="toast-container"></div>
  <!-- thong bao -->
  <!-- Container Navbar -->
  <div id="navbar-container"></div>
  <script src="js/navbar.js" defer></script>

  <main class="container" style="padding:40px 0; min-height: 60vh;">
    <h1 style="margin-bottom: 30px; font-size: 28px; font-weight: 700;">Giỏ hàng của bạn</h1>
    
    <div class="cart-layout">
      <!-- Vùng hiển thị danh sách sản phẩm (JS sẽ đổ dữ liệu vào đây) -->
      <div class="cart-list">
        <!-- Khi đang tải hoặc giỏ hàng trống, nội dung sẽ được thay đổi bởi cart.js -->
        <p style="text-align: center; color: #64748b;">Đang tải giỏ hàng...</p>
      </div>

      <!-- Vùng tóm tắt đơn hàng -->
      <aside class="cart-summary">
        <div class="summary-card" style="background: #f8fafc; padding: 24px; border-radius: 12px; position: sticky; top: 100px;">
          <h3 style="margin-bottom: 20px; font-size: 20px; font-weight: 700; border-bottom: 1px solid #e2e8f0; padding-bottom: 10px;">Tóm tắt đơn hàng</h3>
          
          <div class="summary-row" style="display: flex; justify-content: space-between; margin-bottom: 12px;">
            <span style="color: #64748b;">Tạm tính</span>
            <span id="subtotal" style="font-weight: 600;">0₫</span>
          </div>
          
          <div class="summary-row" style="display: flex; justify-content: space-between; margin-bottom: 12px;">
            <span style="color: #64748b;">Phí vận chuyển</span>
            <span class="free" style="color: #10b981; font-weight: 600;">Miễn phí</span>
          </div>
          
          <hr style="border: 0; border-top: 1px solid #e2e8f0; margin: 16px 0;">
          
          <div class="summary-row total" style="display: flex; justify-content: space-between; margin-bottom: 24px;">
            <span style="font-weight: 700; font-size: 18px;">Tổng tiền</span>
            <span id="total" style="font-weight: 800; font-size: 22px; color: #111827;">0₫</span>
          </div>

          <!-- NÚT THANH TOÁN: 
               Nếu bạn muốn dùng logic Checkout trực tiếp (API) như trong cart.js, 
               hãy dùng <button class="checkout">. 
               Nếu bạn muốn qua trang điền địa chỉ trước, dùng <a href="checkout.html"> -->
          <button class="checkout" style="width: 100%; padding: 16px; border-radius: 8px; border: none; font-size: 16px; font-weight: 600; cursor: pointer;">
            Tiến hành thanh toán
          </button>
          
          <p style="text-align: center; margin-top: 15px;">
            <a href="collections.html" style="color: #64748b; text-decoration: none; font-size: 14px;">← Tiếp tục mua sắm</a>
          </p>
        </div>
      </aside>
    </div>
  </main>

  <!-- Container Footer -->
  <div id="footer-container"></div>

  <!-- Các script hỗ trợ -->
  <script src="js/cartCount.js" defer></script>
  <script src="js/cart.js" defer></script>
  <script src="js/footer.js" defer></script>
  <script src="js/ai-chat.js"></script>
</body>
</html>
