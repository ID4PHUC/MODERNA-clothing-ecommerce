<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Chi tiết đơn hàng - MODERNA</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/account.css">
    <link rel="stylesheet" href="css/navbar.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body { background: #f5f5f5; }
        .detail-container { background: #fff; padding: 25px; border-radius: 2px; box-shadow: 0 1px 1px rgba(0,0,0,0.05); margin-top: 20px; }
        
        /* Header */
        .detail-header { display: flex; justify-content: space-between; align-items: center; padding-bottom: 20px; border-bottom: 1px solid #f1f1f1; margin-bottom: 40px; }
        .back-link { text-decoration: none; color: #555; font-size: 14px; display: flex; align-items: center; gap: 8px; font-weight: 500; text-transform: uppercase; }
        .order-status-text { color: #ee4d2d; font-weight: 600; text-transform: uppercase; margin-left: 10px; }

        /* Stepper */
        .stepper { display: flex; justify-content: space-between; align-items: flex-start; position: relative; margin-bottom: 60px; padding: 0 40px; }
        .stepper::before { content: ""; position: absolute; top: 25px; left: 80px; right: 80px; height: 4px; background: #e0e0e0; z-index: 1; }
        .progress-line { position: absolute; top: 25px; left: 80px; height: 4px; background: #2dc275; z-index: 2; transition: 0.5s ease; width: 0%; }
        
        .step { position: relative; z-index: 3; display: flex; flex-direction: column; align-items: center; width: 140px; text-align: center; }
        .step-icon { width: 50px; height: 50px; border-radius: 50%; background: #fff; border: 4px solid #e0e0e0; display: flex; align-items: center; justify-content: center; font-size: 20px; color: #ccc; transition: 0.3s; }
        .step-label { margin-top: 12px; font-size: 13px; font-weight: 500; color: #888; line-height: 1.4; }
        .step-time { font-size: 11px; color: #bbb; margin-top: 4px; min-height: 14px; }

        .step.active .step-icon { border-color: #2dc275; color: #2dc275; }
        .step.active .step-label { color: #000; }

        /* Address Section */
        .address-section { border-top: 1px dashed #e0e0e0; padding-top: 30px; margin-bottom: 30px; }
        .address-title { font-size: 18px; color: #000; margin-bottom: 20px; font-weight: 500; }
        .address-content { display: flex; gap: 50px; font-size: 14px; color: #555; }
        .address-content strong { color: #000; }

        /* Product List */
        .product-item { display: flex; gap: 15px; padding: 15px 0; border-bottom: 1px solid #f1f1f1; }
        .product-img { width: 80px; height: 80px; object-fit: cover; border: 1px solid #e8e8e8; }
        .product-info { flex: 1; }
        .product-price { text-align: right; color: #ee4d2d; font-weight: 500; }

        /* Footer info */
        .order-summary { margin-top: 20px; text-align: right; border-top: 1px solid #f1f1f1; padding-top: 20px; }
        .summary-row { display: flex; justify-content: flex-end; gap: 20px; margin-bottom: 10px; font-size: 14px; color: #888; }
        .summary-total { font-size: 24px; color: #ee4d2d; font-weight: 600; }

        .btn-shopee { padding: 12px 30px; border-radius: 2px; min-width: 200px; cursor: pointer; border: 1px solid #ddd; background: #fff; font-size: 14px; margin-top: 20px;}
        .btn-orange { background: #ee4d2d; color: #fff; border-color: #ee4d2d; }
    </style>
</head>
<body>
    <div id="navbar-container"></div>

    <div class="container" style="max-width: 1100px;">
        <div class="detail-container">
            <!-- 1. Header: Mã đơn hàng rút gọn -->
            <div class="detail-header">
                <a href="orders.html" class="back-link"><i class="fa-solid fa-chevron-left"></i> Trở lại</a>
                <div>
                    <span style="color: #888;">MÃ ĐƠN HÀNG. <span id="display-order-id" style="font-weight: 600; color: #222;"></span></span>
                    <span style="margin: 0 10px; color: #ddd;">|</span>
                    <span class="order-status-text" id="display-status-text"></span>
                </div>
            </div>

            <!-- 2. Stepper -->
            <div class="stepper">
                <div class="progress-line" id="progress-line"></div>
                <div class="step" id="step-pending">
                    <div class="step-icon"><i class="fa-solid fa-file-invoice"></i></div>
                    <div class="step-label">Đơn Hàng Đã Đặt</div>
                    <div class="step-time" id="time-pending"></div>
                </div>
                <div class="step" id="step-confirmed">
                    <div class="step-icon"><i class="fa-solid fa-check-double"></i></div>
                    <div class="step-label">Đã Xác Nhận</div>
                    <div class="step-time" id="time-confirmed"></div>
                </div>
                <div class="step" id="step-shipping">
                    <div class="step-icon"><i class="fa-solid fa-truck"></i></div>
                    <div class="step-label">Đã Giao Cho ĐVVC</div>
                    <div class="step-time" id="time-shipping"></div>
                </div>
                <div class="step" id="step-delivered">
                    <div class="step-icon"><i class="fa-solid fa-box-open"></i></div>
                    <div class="step-label">Đã Nhận Được Hàng</div>
                    <div class="step-time" id="time-delivered"></div>
                </div>
                <div class="step" id="step-reviewed">
                    <div class="step-icon"><i class="fa-solid fa-star"></i></div>
                    <div class="step-label">Đánh Giá</div>
                    <div class="step-time">---</div>
                </div>
            </div>

            <!-- 3. Địa chỉ nhận hàng -->
            <div class="address-section">
                <div class="address-title">Địa Chỉ Nhận Hàng</div>
                <div class="address-content">
                    <div>
                        <strong id="det-name">---</strong><br>
                        <span id="det-phone">---</span>
                    </div>
                    <div id="det-address" style="line-height: 1.6;">---</div>
                </div>
            </div>

            <!-- 4. Danh sách sản phẩm -->
            <div id="product-list-container">
                <!-- JS sẽ đổ sản phẩm vào đây -->
            </div>

            <!-- 5. Tổng kết -->
            <div class="order-summary">
                <div class="summary-row"><span>Tổng tiền hàng</span> <span id="sum-subtotal">0₫</span></div>
                <div class="summary-row"><span>Phí vận chuyển</span> <span>0₫</span></div>
                <div class="summary-row" style="align-items: center;">
                    <span style="color: #000; font-weight: 500;">Thành tiền</span>
                    <span class="summary-total" id="sum-total">0₫</span>
                </div>
                <div class="summary-row"><span>Phương thức Thanh toán</span> <span id="det-method" style="color:#000">---</span></div>
                
                <button class="btn-shopee btn-orange" id="btn-action">Đánh Giá</button>
                <button class="btn-shopee" onclick="location.href='orders.html'">Mua Lại</button>
            </div>
        </div>
    </div>

<script src="js/navbar.js"></script>
<script src="js/navbar.js"></script>
<script>
    const urlParams = new URLSearchParams(window.location.search);
    const orderId = urlParams.get('id');
    const token = localStorage.getItem('token');

    if (!orderId) location.href = 'orders.html';

    // 1. SỬA HÀM LÀM TRÒN TIỀN (TRÁNH SỐ LẺ .08đ)
    const formatCurrency = (v) => Math.round(v || 0).toLocaleString('vi-VN') + '₫';

    async function loadDetail() {
        try {
            const res = await fetch(`/api/orders/${orderId}`, {
                headers: { 'Authorization': 'Bearer ' + token }
            });
            const order = await res.json();

            // Hiển thị mã đơn rút gọn
            const shortId = order._id.slice(-8).toUpperCase();
            document.getElementById('display-order-id').innerText = shortId;
            document.getElementById('display-status-text').innerText = translateStatus(order.status);

            // 2. SỬA ĐỊA CHỈ (BỎ EMAIL KHỎI DÒNG ĐỊA CHỈ)
            document.getElementById('det-name').innerText = order.address?.name || 'N/A';
            document.getElementById('det-phone').innerText = order.address?.phone || 'N/A';
            document.getElementById('det-address').innerHTML = `
                ${order.address?.detail || 'N/A'}<br>
                <span style="color: #888; font-size: 13px;">${order.address?.email || ''}</span>
            `;
            
            document.getElementById('det-method').innerText = (order.paymentMethod || 'COD').toUpperCase();

            // Tổng tiền (Lấy giá trị total đã được Backend tính toán giảm giá)
            document.getElementById('sum-subtotal').innerText = formatCurrency(order.total);
            document.getElementById('sum-total').innerText = formatCurrency(order.total);

            // Render Sản phẩm
            renderProducts(order.items);

            // Cập nhật Stepper
            updateStepper(order);

        } catch (err) { console.error(err); }
    }

    function renderProducts(items) {
        const container = document.getElementById('product-list-container');
        // Ở đây it.price chính là giá lúc khách mua (đã bao gồm giảm giá nếu có)
        container.innerHTML = items.map(it => `
            <div class="product-item">
                <img src="${it.product?.image || 'img/no-image.png'}" class="product-img">
                <div class="product-info">
                    <div style="font-size: 16px; color: #000; font-weight: 500;">${it.product?.title || 'Sản phẩm không tồn tại'}</div>
                    <div style="color: #888; font-size: 13px; margin-top: 5px;">Phân loại: ${it.size} / ${it.color}</div>
                    <div style="margin-top: 5px;">x${it.quantity}</div>
                </div>
                <div class="product-price">${formatCurrency(it.price)}</div>
            </div>
        `).join('');
    }

    function translateStatus(s) {
        const map = { 
            'pending': 'Chờ xác nhận', 
            'confirmed': 'Đã xác nhận', 
            'shipping': 'Đang giao hàng', 
            'delivered': 'Đã hoàn thành', 
            'cancelled': 'Đã hủy' 
        };
        return map[s] || 'Đang xử lý';
    }

    function updateStepper(order) {
        const steps = ['pending', 'confirmed', 'shipping', 'delivered'];
        const currentIdx = steps.indexOf(order.status);
        const progressLine = document.getElementById('progress-line');
        
        // Thời gian lấy từ lúc tạo đơn
        const timeStr = new Date(order.createdAt).toLocaleString('vi-VN', {
            hour:'2-digit', minute:'2-digit', day:'2-digit', month:'2-digit', year:'numeric'
        });

        steps.forEach((s, i) => {
            const stepEl = document.getElementById(`step-${s}`);
            if (i <= currentIdx) {
                stepEl.classList.add('active');
                document.getElementById(`time-${s}`).innerText = timeStr;
            } else {
                stepEl.classList.remove('active');
            }
        });

        // 3. LOGIC THANH TIẾN ĐỘ (PROGRESS LINE)
        if (currentIdx >= 0) {
            // Tính toán % dựa trên vị trí các icon (có 4 chặng nên chia cho 3 khoảng cách)
            const percentage = (currentIdx / (steps.length - 1)) * 100;
            progressLine.style.width = `${percentage}%`;
        } else {
            progressLine.style.width = `0%`;
        }

        // Nếu đơn hàng đã hủy, ẩn thanh tiến độ hoặc xử lý riêng
        if (order.status === 'cancelled') {
            document.getElementById('display-status-text').style.color = '#888';
            progressLine.style.background = '#ccc';
        }

        // Chỉ hiện nút đánh giá khi đơn hàng Đã giao thành công
        if (order.status !== 'delivered') {
            document.getElementById('btn-action').style.display = 'none';
        }
    }

    loadDetail();
</script>
</body>
</html>
