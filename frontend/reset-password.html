<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Đặt lại mật khẩu - MODERNA</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/rqw.css">
  <!-- Thêm font chữ và icon -->
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body class="auth-bg">
  <main class="auth-container">
    <div class="auth-card">
      <div class="auth-header">
        <div class="auth-icon">
          <i class="fa-solid fa-shield-halved"></i>
        </div>
        <h1>Mật khẩu mới</h1>
        <p>Vui lòng tạo một mật khẩu mạnh để bảo vệ tài khoản của bạn.</p>
      </div>
      
      <form id="resetForm" class="auth-form">
        <div class="form-group">
          <label for="new-password">Mật khẩu mới</label>
          <div class="input-wrapper">
            <input type="password" id="new-password" placeholder="Tối thiểu 6 ký tự" required minlength="6" />
          </div>
        </div>

        <div class="form-group">
          <label for="confirm-password">Xác nhận mật khẩu</label>
          <div class="input-wrapper">
            <input type="password" id="confirm-password" placeholder="Nhập lại mật khẩu mới" required />
          </div>
        </div>
        
        <button type="submit" class="btn-primary-auth">
          Cập nhật mật khẩu <i class="fa-solid fa-check-double" style="margin-left: 8px;"></i>
        </button>
      </form>

      <div class="auth-footer">
        <a href="login.html" class="back-link">
          <i class="fa-solid fa-arrow-left"></i> Quay lại đăng nhập
        </a>
      </div>
    </div>
  </main>

  <script src="js/auth.js"></script> 
</body>
</html>
