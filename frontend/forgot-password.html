<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="utf-8" />
    <title>Quên mật khẩu - MODERNA</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/qmk.css">
    <!-- Thêm font chữ cho hiện đại -->
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body class="auth-bg">
    <main class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <div class="auth-icon">
                    <i class="fa-solid fa-lock-open"></i>
                </div>
                <h1>Quên mật khẩu</h1>
                <p>Đừng lo lắng! Nhập email của bạn và chúng tôi sẽ gửi hướng dẫn đặt lại mật khẩu.</p>
            </div>

            <form id="forgotForm" class="auth-form">
                <div class="form-group">
                    <label for="forgot-email">Địa chỉ Email</label>
                    <input type="email" id="forgot-email" placeholder="example@gmail.com" required />
                </div>
                
                <button type="submit" class="btn-primary-auth">
                    Gửi link xác nhận <i class="fa-solid fa-paper-plane" style="margin-left: 8px;"></i>
                </button>
            </form>

            <div class="auth-footer">
                <a href="login.html" class="back-link">
                    <i class="fa-solid fa-arrow-left"></i> Quay lại đăng nhập
                </a>
            </div>
        </div>
    </main>

    <script src="js/auth.js"></script>
</body>
</html>
